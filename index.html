<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Share Videos and Photos</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  h1 { text-align: center; }
  .upload-section { margin-bottom: 40px; }
  label { display: block; margin-top: 10px; }
  input[type="file"] { margin-top: 5px; }
  button { margin-top: 10px; }
  .shared-links { margin-top: 20px; }
  .shared-item { margin-bottom: 10px; }
</style>
</head>
<body>

<h1>Upload and Share Photos & Videos</h1>

<div class="upload-section">
  <h2>Upload Photo</h2>
  <input type="file" id="photoInput" accept="image/*" />
  <button onclick="shareFile('photo')">Share Photo</button>
</div>

<div class="upload-section">
  <h2>Upload Video</h2>
  <input type="file" id="videoInput" accept="video/*" />
  <button onclick="shareFile('video')">Share Video</button>
</div>

<div class="shared-links">
  <h2>Shared Files</h2>
  <div id="sharedPhotos"></div>
  <div id="sharedVideos"></div>
</div>

<script>
  function shareFile(type) {
    const inputId = type === 'photo' ? 'photoInput' : 'videoInput';
    const displayId = type === 'photo' ? 'sharedPhotos' : 'sharedVideos';
    const input = document.getElementById(inputId);
    if (input.files && input.files[0]) {
      const file = input.files[0];
      const reader = new FileReader();
      reader.onload = function(e) {
        const url = e.target.result;
        const link = document.createElement('a');
        link.href = url;
        link.textContent = `View ${type}: ${file.name}`;
        link.target = '_blank';

        const container = document.createElement('div');
        container.className = 'shared-item';
        container.appendChild(link);

        document.getElementById(displayId).appendChild(container);
      };
      reader.readAsDataURL(file);
    } else {
      alert('Please select a file to share.');
    }
  }
</script>

</body>
</html>
